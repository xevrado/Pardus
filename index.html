<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dosya Paylaşım Merkezi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #60a5fa, #34d399);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 1rem;
            color: #9ca3af;
            margin-bottom: 40px;
            text-align: center;
        }

        /* File List */
        .file-list-container {
            width: 100%;
            max-width: 600px;
        }

        .file-list-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .file-list-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c4b5fd;
        }

        .file-count {
            font-size: 0.85rem;
            color: #6b7280;
            background: rgba(167, 139, 250, 0.1);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            animation: slideIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes slideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .file-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(167, 139, 250, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        .file-icon-wrapper {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: white;
            letter-spacing: 0.5px;
        }

        .file-info {
            flex: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 0.95rem;
            font-weight: 500;
            color: #e5e7eb;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-meta {
            font-size: 0.8rem;
            color: #6b7280;
            margin-top: 4px;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .btn {
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
        }

        .btn-download {
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: white;
        }

        .btn-download:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(167, 139, 250, 0.4);
        }

        .btn-download:active {
            transform: scale(0.97);
        }

        .btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            fill: #374151;
            margin-bottom: 16px;
        }

        .empty-state p {
            font-size: 0.95rem;
        }

        /* Responsive */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.8rem;
            }

            .file-card {
                flex-wrap: wrap;
            }

            .file-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>

<body>

    <h1>📂 Dosya Paylaşım Merkezi</h1>
    <p class="subtitle">Dosyaları tek tıkla indirin</p>

    <!-- File List -->
    <div class="file-list-container">
        <div class="file-list-header" id="fileListHeader" style="display: none;">
            <span class="file-list-title">Paylaşılan Dosyalar</span>
            <span class="file-count" id="fileCount">0 dosya</span>
        </div>
        <div class="file-list" id="fileList">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z" />
                </svg>
                <p>Henüz dosya eklenmedi</p>
            </div>
        </div>
    </div>

    <script>
        const fileList = document.getElementById('fileList');
        const fileListHeader = document.getElementById('fileListHeader');
        const fileCount = document.getElementById('fileCount');
        const emptyState = document.getElementById('emptyState');

        // =====================================================
        // BURAYA PAYLAŞMAK İSTEDİĞİNİZ DOSYALARI YAZIN
        // Dosyaları GitHub'a yükleyin, sonra aşağıya ekleyin.
        // =====================================================
        const files = [
            {
                name: 'ornek-kitap.pdf',
                size: 2500000,                    // Boyut (Byte cinsinden, örn: 2500000 = 2.5 MB)
                url: './ornek-kitap.pdf',          // Dosyanın GitHub'daki yolu (aynı klasördeyse ./dosyaadi)
                date: new Date('2024-04-01')
            },
            {
                name: 'ders-notlari.docx',
                size: 1200000,
                url: './ders-notlari.docx',
                date: new Date('2024-04-02')
            }
            // Yeni dosya eklemek için virgül koyup aşağıya kopyalayın:
            // ,{
            //     name: 'dosya-adi.pdf',
            //     size: 1000000,
            //     url: './dosya-adi.pdf',
            //     date: new Date('2024-05-01')
            // }
        ];

        // Sayfa açıldığında dosyaları listele
        window.onload = () => {
            renderFileList();
        };

        function renderFileList() {
            if (files.length === 0) {
                emptyState.style.display = 'block';
                fileListHeader.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            fileListHeader.style.display = 'flex';
            fileCount.textContent = `${files.length} dosya`;

            files.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'file-card';
                card.style.animationDelay = `${index * 0.08}s`;

                const ext = getFileExtension(file.name);
                const color = getExtColor(ext);

                card.innerHTML = `
                    <div class="file-icon-wrapper" style="background: ${color};">
                        ${ext || '?'}
                    </div>
                    <div class="file-info">
                        <div class="file-name" title="${file.name}">${file.name}</div>
                        <div class="file-meta">${formatSize(file.size)} • ${formatDate(file.date)}</div>
                    </div>
                    <div class="file-actions">
                        <a href="${file.url}" download="${file.name}" class="btn btn-download" title="İndir">
                            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                            İndir
                        </a>
                    </div>
                `;

                fileList.appendChild(card);
            });
        }

        function getFileExtension(name) {
            const parts = name.split('.');
            return parts.length > 1 ? parts.pop().toLowerCase() : '';
        }

        function getExtColor(ext) {
            const colors = {
                pdf: 'linear-gradient(135deg, #ef4444, #dc2626)',
                doc: 'linear-gradient(135deg, #3b82f6, #2563eb)',
                docx: 'linear-gradient(135deg, #3b82f6, #2563eb)',
                xls: 'linear-gradient(135deg, #10b981, #059669)',
                xlsx: 'linear-gradient(135deg, #10b981, #059669)',
                ppt: 'linear-gradient(135deg, #f97316, #ea580c)',
                pptx: 'linear-gradient(135deg, #f97316, #ea580c)',
                jpg: 'linear-gradient(135deg, #8b5cf6, #7c3aed)',
                jpeg: 'linear-gradient(135deg, #8b5cf6, #7c3aed)',
                png: 'linear-gradient(135deg, #8b5cf6, #7c3aed)',
                gif: 'linear-gradient(135deg, #ec4899, #db2777)',
                mp4: 'linear-gradient(135deg, #f43f5e, #e11d48)',
                mp3: 'linear-gradient(135deg, #06b6d4, #0891b2)',
                zip: 'linear-gradient(135deg, #eab308, #ca8a04)',
                rar: 'linear-gradient(135deg, #eab308, #ca8a04)',
                txt: 'linear-gradient(135deg, #6b7280, #4b5563)',
                js: 'linear-gradient(135deg, #fbbf24, #d97706)',
                html: 'linear-gradient(135deg, #f97316, #ea580c)',
                css: 'linear-gradient(135deg, #3b82f6, #1d4ed8)',
            };
            return colors[ext] || 'linear-gradient(135deg, #6366f1, #4f46e5)';
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        function formatDate(date) {
            return date.toLocaleDateString('tr-TR', {
                day: 'numeric',
                month: 'short',
                year: 'numeric'
            });
        }
    </script>
</body>

</html>
